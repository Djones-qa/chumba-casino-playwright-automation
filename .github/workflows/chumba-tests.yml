name: Chumba Casino Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run auth tests
        run: npm run test:auth
        env:
          CHUMBA_EMAIL: dummy@test.com
          CHUMBA_PASSWORD: dummypassword

      - name: Run public page tests
        run: npx playwright test tests/auth.spec.ts --grep "should load login page|should show email|should show forgot|should show social"
        env:
          CHUMBA_EMAIL: dummy@test.com
          CHUMBA_PASSWORD: dummypassword
